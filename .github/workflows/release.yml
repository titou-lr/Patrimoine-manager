name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # nécessaire pour créer la Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        # Retire le préfixe "v" du tag (v1.2.3 → 1.2.3) et écrit directement dans package.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Windows installer
        run: npm run electron:build

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true   # notes auto depuis les commits depuis le dernier tag
          fail_on_unmatched_files: true
