<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patrimoine — Linear redesign</title>

  <!-- Geist via CDN (closest available) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <!-- patch font vars to DM Sans (Geist substitute) -->
  <style>
    :root {
      --font-sans: "DM Sans", -apple-system, system-ui, sans-serif;
      --font-mono: "DM Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 99px;
      background: var(--surface-3); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 15px; height: 15px; border-radius: 99px;
      background: var(--primary); border: 2px solid var(--canvas);
      box-shadow: 0 0 0 1px var(--primary);
    }
    /* transition overrides for smoother screen swaps */
    .screen-enter { animation: screenIn .22s cubic-bezier(.4,0,.2,1); }
    @keyframes screenIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  </style>

  <!-- React 18 + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- 1. Data (plain JS, no JSX) -->
<script src="data.js"></script>

<!-- 2. Component files (Babel-transpiled JSX, order matters) -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screen_dashboard.jsx"></script>
<script type="text/babel" src="screen_envelopes.jsx"></script>
<script type="text/babel" src="screen_optimizer.jsx"></script>
<script type="text/babel" src="screen_data.jsx"></script>
<script type="text/babel" src="screen_profile.jsx"></script>

<!-- 3. App root -->
<script type="text/babel">
(function () {
  const { useState, useEffect } = React;

  /* ── tiny router ── */
  const ROUTES = ["dashboard", "envelopes", "optimizer"];

  function App() {
    const [route, setRoute]       = useState(() => localStorage.getItem("pl_route") || "dashboard");
    const [palette, setPalette]   = useState(false);
    const [dataModal, setDataModal] = useState(false);
    const [profileModal, setProfileModal] = useState(false);
    const [onboarding, setOnboarding]   = useState(false);
    const [simRunning, setSimRunning]    = useState(false);
    const [simDirty, setSimDirty]        = useState(false);

    const go = (r) => {
      if (ROUTES.includes(r)) {
        setRoute(r);
        localStorage.setItem("pl_route", r);
        setPalette(false);
        setDataModal(false);
        setProfileModal(false);
      }
    };

    // keyboard shortcuts
    useEffect(() => {
      const h = (e) => {
        const meta = e.metaKey || e.ctrlKey;
        if (meta && e.key === "k") { e.preventDefault(); setPalette((p) => !p); }
        if (e.key === "Escape")    { setPalette(false); setDataModal(false); setProfileModal(false); setOnboarding(false); }
        if (meta && e.key === "1") { e.preventDefault(); go("dashboard"); }
        if (meta && e.key === "2") { e.preventDefault(); go("envelopes"); }
        if (meta && e.key === "3") { e.preventDefault(); go("optimizer"); }
      };
      window.addEventListener("keydown", h);
      return () => window.removeEventListener("keydown", h);
    }, []);

    const runSim = () => {
      setSimRunning(true); setSimDirty(false);
      setTimeout(() => setSimRunning(false), 2200);
    };

    const shellProps = {
      route, go,
      openData:    () => setDataModal(true),
      openProfile: () => setProfileModal(true),
      openPalette: () => setPalette(true),
      openOnboarding: () => { setOnboarding(true); setProfileModal(false); },
    };

    /* ── decide layout mode ── */
    // Dashboard is full-width (TopBar instead of Sidebar)
    const fullWidth = route === "dashboard";

    return React.createElement(React.Fragment, null,

      /* ── App shell ── */
      React.createElement("div", { className: "app" },

        /* Sidebar (on all screens except dashboard) */
        !fullWidth && React.createElement(window.Shell.Sidebar, { ...shellProps, dirty: simDirty }),

        /* Main column */
        React.createElement("div", { className: "content" },

          /* TopBar (dashboard only) */
          fullWidth && React.createElement(window.Shell.TopBar, shellProps),

          /* Screen area */
          React.createElement("div", { key: route, className: "screen-enter", style: { flex: 1, display: "flex", minWidth: 0, overflow: "hidden" } },
            route === "dashboard" && React.createElement(window.DashboardScreen, { go }),
            route === "envelopes" && React.createElement(window.EnvelopesScreen, { openData: () => setDataModal(true), runSim, isRunning: simRunning }),
            route === "optimizer" && React.createElement(window.OptimizerScreen, null)))),

      /* ── Overlays ── */
      palette && React.createElement(window.Shell.CommandPalette, { close: () => setPalette(false), go, openData: () => { setDataModal(true); setPalette(false); }, openProfile: () => { setProfileModal(true); setPalette(false); }, openOnboarding: () => { setOnboarding(true); setPalette(false); } }),
      dataModal && React.createElement(window.DataModal, { close: () => setDataModal(false) }),
      profileModal && React.createElement(window.ProfileScreen, { close: () => setProfileModal(false), startOnboarding: () => setOnboarding(true) }),
      onboarding && React.createElement(window.OnboardingModal, { close: () => setOnboarding(false) }));
  }

  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
})();
</script>
</body>
</html>
